<app-header title="My Money" [showBackButton]="true" />
<section class="my-money-page">
  <section class="my-money-section">
    <app-accounts-section
      [accounts]="accounts()"
      [title]="'Your Accounts'"
      [actionLabel]="'Add New'"
      [layout]="'stack'"
      [showAddAccountTile]="false"
      [showDelete]="true"
      [transferLabel]="'Transfer'"
      (action)="openAddAccount()"
      (transfer)="openTransfer()"
      (removeAccount)="removeAccount($event)"
    />
  </section>
</section>
