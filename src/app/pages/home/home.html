<app-header [showProfile]="true" [userName]="'John'" />

<div class="content">
  <app-financial-overview [weeklyEarnings]="weeklyEarnings()" [monthlyEarnings]="monthlyEarnings()"
    [weeklySpending]="weeklySpending()" [monthlySpending]="monthlySpending()" />

  <app-accounts-section [accounts]="accounts()" [accountsClickable]="true" (action)="openMyMoney()"
    (transfer)="openTransfer()" (addAccount)="openAddAccount()" (removeAccount)="removeAccount($event)"
    (accountClick)="openMyMoney()" />

  <app-upcoming-payments-section [payments]="upcomingPayments()" (paymentClick)="onPaymentClick($event)" />

  <app-spending-analysis [monthlyBudget]="monthlyBudget()" [spent]="spent()" />
</div>
