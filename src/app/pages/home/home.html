<app-header [showProfile]="true" [userName]="'John'" />

<div class="content">
  <app-financial-overview
    [weeklyEarnings]="weeklyEarnings()"
    [monthlyEarnings]="monthlyEarnings()"
    [weeklySpending]="weeklySpending()"
    [monthlySpending]="monthlySpending()"
  />

  <app-cards-section
    [cards]="cards()"
    [cardsClickable]="true"
    (action)="openMyMoney()"
    (addCard)="openAddCard()"
    (removeCard)="removeCard($event)"
    (cardClick)="openMyMoney()"
  />

  <app-cash-wallet
    [balance]="cashWalletBalance()"
    (topUp)="topUpCashWallet()"
  />

  <app-upcoming-payments-section
    [payments]="upcomingPayments()"
    (paymentClick)="onPaymentClick($event)"
  />

  <app-spending-analysis
    [monthlyBudget]="monthlyBudget()"
    [spent]="spent()"
  />
</div>
