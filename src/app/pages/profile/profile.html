<section class="profile-page">
  <app-header
    title="Profile"
    [showBackButton]="true"
    [showActionButton]="true"
    [actionIconSrc]="'/icons/profile-settings.svg'"
    [actionAriaLabel]="'Profile settings'"
    (actionClick)="openSettings()"
  />

  <section class="profile-hero">
    <div class="avatar-wrap">
      <div class="avatar" aria-hidden="true">
        <span>JD</span>
      </div>
    </div>

    <h2>{{ profileName() }}</h2>
    <p>{{ profileEmail() }}</p>
  </section>

</section>
