<app-header title="Добавить категорию" />

<app-entity-form-shell [formGroup]="categoryForm" ariaLabel="Форма добавления категории" (submitted)="onSubmit()">
  <div entityFormContent class="entity-form-stack">
    <div class="entity-field">
      <span class="entity-label">
        Тип категории
        <span class="required">*</span>
      </span>
      <div class="entity-radio-group" role="radiogroup" aria-label="Тип категории">
        @for (type of categoryTypes; track type.value) {
          <label class="entity-radio" [class.entity-radio--disabled]="isSubmitting()">
            <input
              class="entity-radio__input"
              type="radio"
              name="categoryType"
              [value]="type.value"
              [checked]="selectedCategoryType() === type.value"
              [disabled]="isSubmitting()"
              (change)="selectCategoryType(type.value)"
            />
            <span class="entity-radio__control" aria-hidden="true"></span>
            <span class="entity-radio__label">{{ type.label }}</span>
          </label>
        }
      </div>
    </div>

    <div class="entity-field">
      <label class="entity-label" for="category-name">
        Название категории
        <span class="required">*</span>
      </label>
      <input
        id="category-name"
        type="text"
        class="entity-input"
        [class.error]="hasError('name')"
        placeholder="например, Подписки"
        [formControl]="nameControl"
        [attr.aria-invalid]="hasError('name')"
        [attr.aria-describedby]="hasError('name') ? 'category-name-error' : null"
      />
      @if (hasError('name')) {
        <span id="category-name-error" class="entity-error" role="alert">
          {{ getErrorMessage('name') }}
        </span>
      }
    </div>
  </div>

  <div entityFormActions>
    <button
      type="submit"
      class="entity-btn entity-btn--primary"
      [disabled]="categoryForm.invalid || isSubmitting() || !isOnline()"
      [attr.aria-busy]="isSubmitting()"
    >
      @if (isSubmitting()) {
        <span class="entity-spinner" aria-hidden="true"></span>
        <span>Добавление...</span>
      } @else {
        <span>Добавить категорию</span>
      }
    </button>
    <button
      type="button"
      class="entity-btn entity-btn--secondary"
      (click)="onCancel()"
      [disabled]="isSubmitting()"
    >
      Отмена
    </button>
  </div>
</app-entity-form-shell>
