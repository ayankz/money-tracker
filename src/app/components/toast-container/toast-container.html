<div class="toast-container" aria-live="polite" aria-atomic="true">
  @for (item of notifications.items(); track item.id) {
    <div
      class="toast"
      [class.toast--success]="item.kind === 'success'"
      [class.toast--error]="item.kind === 'error'"
      [class.toast--info]="item.kind === 'info'"
      [class.toast--closing]="item.closing"
      [attr.role]="item.kind === 'error' ? 'alert' : 'status'"
    >
      <span class="toast__message">{{ item.message }}</span>
    </div>
  }
</div>
