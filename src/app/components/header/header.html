<header [class.header--glass]="appearance() === 'glass'">
  <div class="header-content">
    @if (showProfile()) {
      <div class="profile-section">
        <div class="greeting">
          <p class="greeting-text">Good morning</p>
          <span class="user-name">{{ userName() }}</span>
        </div>
        <button
          class="profile-button"
          type="button"
          aria-label="Open profile menu"
          [attr.aria-expanded]="showProfileMenu()"
          (click)="toggleProfileMenu()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"
            />
          </svg>
        </button>
      </div>
    } @else if (variant() === 'logo') {
      <div class="logo">
        <img class="logo__icon" src="/icons/logo.svg" [alt]="logoName() + ' logo'">
        <span class="logo__name">{{ logoName() }}</span>
      </div>
    } @else {
      <div class="title-bar" [class.title-bar--with-action]="showActionButton()">
        @if (showBackButton()) {
          <button
            class="back-button"
            type="button"
            aria-label="Go back to previous page"
            (click)="goBack()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
          </button>
        } @else {
          <div class="title-bar__spacer" aria-hidden="true"></div>
        }

        <h1 class="title">{{ title() }}</h1>

        @if (showActionButton()) {
          <button
            class="action-button"
            type="button"
            [attr.aria-label]="actionAriaLabel()"
            (click)="onActionClick()"
          >
            <img class="action-button__icon" [src]="actionIconSrc()" alt="" aria-hidden="true">
          </button>
        } @else {
          <div class="title-bar__spacer" aria-hidden="true"></div>
        }
      </div>
    }
  </div>

  @if (showProfileMenu()) {
    <div class="profile-menu" role="menu">
      <a href="#" role="menuitem">Настройки</a>
      <a href="#" role="menuitem">Выход</a>
    </div>
  }
</header>
