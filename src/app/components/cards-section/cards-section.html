<section class="cards-section">
  <div class="section-heading">
    <h3 class="section-title">{{ title() }}</h3>
    <button class="secondary-button" type="button" (click)="onAction()">{{ actionLabel() }}</button>
  </div>

  <div class="cards-list" [class.cards-list--stack]="layout() === 'stack'">
    @for (account of accounts(); track account.id) {
    <app-money-card [card]="account" [clickable]="accountsClickable()" [showDelete]="showDelete()"
      (open)="onAccountClick(account.id)" (remove)="onRemoveAccount($event)" />
    }

    @if (showAddAccountTile()) {
    <button class="add-card" type="button" (click)="onAddAccount()">
      <span class="add-card__plus">+</span>
      <span>Add account</span>
    </button>
    }
  </div>
</section>
